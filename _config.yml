# Smart Pick Reviews - Jekyll Configuration
title: "Smart Pick Reviews"
tagline: "Honest product reviews. Smarter buying decisions."
description: "In-depth product reviews and buying guides to help you find the best value. We research, compare, and recommend so you can shop with confidence."
baseurl: "/ai-money-blog"
url: "https://alfy-liaozr.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
theme: jekyll-theme-primer

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO
author:
  name: "Smart Pick Reviews"
  twitter: ""

# Social
social:
  name: "Smart Pick Reviews"
  links:
    - "https://github.com/alfy-liaozr/ai-money-blog"

# Collections
collections:
  pages:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Smart Pick Reviews"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - scripts

# Amazon Associates
amazon_tag: "alfyliaozr20-20"

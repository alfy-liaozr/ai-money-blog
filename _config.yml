# AI Money System - Jekyll Configuration
title: "AI Money System"
tagline: "AI-Powered Product Reviews & Buying Guides"
description: "Discover the best products through AI-generated reviews. Honest, data-driven buying guides for smart shoppers. As an Amazon Associate, we earn from qualifying purchases."
baseurl: "/ai-money-blog"
url: "https://alfy-liaozr.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
theme: jekyll-theme-primer

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO
author:
  name: "AI Money System"
  twitter: ""

# Social
social:
  name: "AI Money System"
  links:
    - "https://github.com/alfy-liaozr/ai-money-blog"

# Pagination

# Collections
collections:
  pages:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "AI Money System"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - scripts

# Amazon Associates
amazon_tag: "alfyliaozr20-20"

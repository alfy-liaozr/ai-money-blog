<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="feed" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  
  <!-- SEO -->
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <meta name="keywords" content="{{ page.tags | join: ', ' }}">
  
  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.excerpt | strip_html | normalize_whitespace | truncate: 200 }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:locale" content="en_US">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ page.excerpt | strip_html | normalize_whitespace | truncate: 200 }}">
  
  <!-- Article Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title | escape }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Person",
      "name": "{{ site.author.name }}"
    },
    "publisher": {
      "@type": "Organization",
      "name": "{{ site.title }}"
    },
    "description": "{{ page.excerpt | strip_html | normalize_whitespace | truncate: 200 | escape }}"
  }
  </script>
</head>
<body>
  {% include header.html %}
  
  <main>
    <article class="post" itemscope itemtype="https://schema.org/Article">
      <h1 class="post-title" itemprop="name">{{ page.title }}</h1>
      
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">{{ page.date | date: "%B %-d, %Y" }}</time>
        {% if page.tags.size > 0 %}
        <span class="post-tags">
          {% for tag in page.tags %}
          <a href="{{ '/tag/' | relative_url }}{{ tag | append: '' | slugify }}/">{{ tag }}</a>
          {% endfor %}
        </span>
        {% endif %}
      </div>
      
      {% include affiliate-disclosure.html %}
      
      <div class="post-content" itemprop="articleBody">
        {{ content }}
      </div>
    </article>
  </main>
  
  {% include footer.html %}
</body>
</html>
